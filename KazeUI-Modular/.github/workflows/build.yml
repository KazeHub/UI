name: Bundle KazeUI

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'init.lua'
      - 'build.py'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-python: '3.x'

    - name: Run bundle script
      run: python build.py

    - name: Commit and push compiled dist.lua
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add dist.lua
        git commit -m "Auto-compiled dist.lua [skip ci]" || echo "No changes to commit"
        git push
